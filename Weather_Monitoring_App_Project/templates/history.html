<!DOCTYPE html>
<html>
<head>
<title>History</title>
</head>

<body>

<h1>Weather History</h1>

<table border="1">

<tr>
<th>ID</th>
<th>City</th>
<th>Temperature</th>
<th>Humidity</th>
<th>Wind</th>
<th>Date Time</th>
</tr>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>
</html>
